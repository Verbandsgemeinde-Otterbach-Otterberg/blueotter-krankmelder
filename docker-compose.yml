services:
  krankmelder:
    image: blueotter-krankmelder:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blueotter-krankmelder
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      DATABASE_URL: /app/data/krankmeldungen.db
      UPLOAD_DIR: /app/uploads
    volumes:
      - krankmelder-data:/app/data
      - krankmelder-uploads:/app/uploads

volumes:
  krankmelder-data:
  krankmelder-uploads:
